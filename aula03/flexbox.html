<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            padding: 50px 50px;
        }
        /* class: .+ nome da classe*/

        .box1{
            background-color: rgb(20, 48, 173);
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: start;
            display: flex;
            align-items: center;
            flex-direction: column;
        }

        #titulo-principal {
            color: white;
        }

        ul{
            display: flex;
            gap: 30px;

        }

        ul li{
            list-style: none;
            font-size: 1.5rem;
        }

        a{
            color: grey;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            text-decoration: none;
        }

    </style>
</head>

<body>
    <div class="box1">

        <h1 id="titulo-principal">Flex Box</h1>
        <h2 id="titulo-principal">Flex Box2</h2>
        <h3 id="titulo-principal">Flex Box3</h3>


    </div>

    <div>
        <ul>
            <li><a href="#"> Home</a></li>
            <li><a href="#>">Sobre</a></li>
            <li><a href="#">Serviços</a></li>
            <li><a href="">Contato</a></li>
        </ul>
    </div>









</body>
</html>
