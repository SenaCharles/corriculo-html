<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exercício Card</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(90deg, rgba(115,81,171,1) 0%, rgba(104,118,223,1) 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.card {
    background-color: white;
    width: 350px;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

.subt{
    color: #667eea;
}

.avatar {
    background: #667eea;
    width: 90px;
    height: 90px;
    margin: 0 auto 15px;

    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    color: white;
    font-weight: bold;
    outline-offset: -5px;
    outline: 2px solid #fff;
    font-size: 40px;
}

.card h2 {
    margin-bottom: 5px;
}

.card h3 {
    margin-bottom: 15px;
}

.card p {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
    line-height: 1.5;
    text-align: center;
}

ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin: 15px 0;
}

ul li {
    border: 1px solid #ddd;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 13px;
    background-color: #f7fafc;
    color: #6877e0;
    outline: 2px solid #e2e8fe;
}

button {
    margin-top: 15px;
    border: none;
    padding: 12px 20px;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    font-weight: bold;

    background: linear-gradient(90deg, #667eea, #764ba2);
}

button:hover{
    background: black;
    transition: background 3s ease;
}
</style>

</head>

<body>

<div class="card">

    <div class="avatar">
        CM
    </div>

    <h2>Charles Mascarenhas</h2>
    <h3 class="subt">Desenvolvedor Front-End</h3>

    <p>
        Apaixonado por criar experiências digitais incríveis.
        Especializado em HTML, CSS e JavaScript com foco em
        interfaces modernas e responsivas.
    </p>

    <h3>Habilidades</h3>

    <ul>
        <li>HTML5</li>
        <li>CSS3</li>
        <li>JavaScript</li>
        <li>FlexBox</li>
    </ul>

    <button>Entre em Contato</button>

</div>

</body>
</html>
